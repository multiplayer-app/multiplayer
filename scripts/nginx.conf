upstream collaborationServer {
  least_conn;
  server host.docker.internal:3003;
}

upstream versionServer {
  least_conn;
  server host.docker.internal:3006;
}



server {
  listen 0.0.0.0:80;

  client_max_body_size 25m;

  location /.well-known {
    proxy_pass http://host.docker.internal:3001/.well-known;
  }

  location /v0/api {
    proxy_pass http://host.docker.internal:3001/v0/api;
  }

  location /v0/auth {
    proxy_pass http://host.docker.internal:3002/v0/auth;
  }

  location /v0/collaboration/ws {
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Host $host;

    proxy_pass http://collaborationServer/v0/collaboration/ws;

    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }

  location /v0/collaboration {
    proxy_pass http://collaborationServer/v0/collaboration;
  }

  location /v0/directory {
    proxy_pass http://host.docker.internal:3004/v0/directory;
  }

  location /v0/version {
    proxy_pass http://versionServer/v0/version;
  }


  location /v0/git {
    proxy_pass http://host.docker.internal:3007/v0/git;
  }

  location /v0/radar {
    proxy_pass http://host.docker.internal:5318/v0/radar;
  }

    location /v0/radar/ws {
    proxy_pass http://host.docker.internal:5318/v0/radar/ws;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 86400;
  }

  location / {
    proxy_pass http://host.docker.internal:3000/;
  }

  location /public-bucket {
    proxy_pass http://host.docker.internal:9000;
  }

  location /v1/traces {
    proxy_pass http://host.docker.internal:7318/v1/traces;
  }

  location /v1/logs {
    proxy_pass http://host.docker.internal:7318/v1/logs;
  }

  location /jaeger/v1/traces {
    proxy_pass http://host.docker.internal:6318/v1/traces;
  }

  location /v0/assets {
    proxy_pass http://host.docker.internal:3009/v0/assets;
  }
}
